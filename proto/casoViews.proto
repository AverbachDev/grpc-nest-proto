syntax = "proto3";

package casoViews;


service CasoViewsService {

    rpc listAreaTrabalho (ListCriteriaRequestAreaDeTrabalho) returns (ServiceResponseListAreaDeTrabalho) {}
}

message EmptyRequest{}

message IdRequest{
    int32 id = 1;
}

message ServiceResponseBoolean {
    int32 status = 1;
    string message = 2;
    bool data = 3;
    string error = 4;
}

message ServiceResponseInteger {
    int32 status = 1;
    string message = 2;
    int32 data = 3;
    string error = 4;
}

//CASO


message ListCriteriaRequestAreaDeTrabalho {
    int32 idCaso = 1;
    int32 idCliente = 2;
    int32 idDevedor = 3;
    string cdCnpjCpfDevedor = 4;
    string deDdd = 5;
    string deTelefone = 6;
    string deCep = 7;
    double totalPrincipalInicio = 8;
    double totalPrincipalFim = 9;
    string dtCadastroInicio = 10;
    string dtCadastroFim = 11;
    string dtDistribuicaoInicio = 12;
    string dtDistribuicaoFim = 13;
    string dtAgendContInicio = 14;
    string dtAgendContFim = 15;
    int32 idUsuaCobrador = 16;
    int32 items = 17;
    int32 page = 18;
    map<string, string> order = 19;
}

message AreaDeTrabalhoData {
    int32 idCliente=1;
    string nmCliente = 2;
    string cdTipoContrato = 3;
    int32 idGrupo = 4;
    int32 idDevedor = 5;
    string nmDevedor = 6;
    string cdCnpjCpf = 7;
    string deLogradouro = 8;
    string deDdd = 9;
    string deTelefone = 10;
    string deCep = 11;
    int32 idMunicipio = 12;
    int32 idFederacao = 13;
    int32 idCaso = 14;
    string dtCadastro = 15;
    int32 idStatusCobranca = 16;
    double totalPrincipal = 17;
    string dtUltimoHistorico = 18;
    int32 idUsuaCobrador = 19;
    string dtUsuaCobrador = 20;
    string dtRegistro = 21;
    string cdavaliacao = 22;
    string dtAvaliacao = 23;
    string dtAgendCont = 24;
    bool cdPesquisa = 25;
    string dtPesquisa = 26;
    bool cdPossuiHistoricoCobrador = 27;
    int32 nuDiasSemHistCobranca = 28;
    bool cdQuebraAcordo = 29;
    int32 diasPosse = 30;
    int32 aging = 31;
    string cdClassificacao = 32;
    int32 idMotivoInadimplencia = 33;
    string deMotivoInadimplencia = 34;
}


message ServiceResponseAreaDeTrabalho {
    int32 status = 1;
    string message = 2;
    repeated AreaDeTrabalhoData data = 3;
    string error = 4;
}

message ServiceResponseListAreaDeTrabalho {
    int32 status = 1;
    string message = 2;
    ListResultAreaDeTrabalho data = 3;
    string error = 4;
}

message ListResultAreaDeTrabalho {
    repeated AreaDeTrabalhoData result = 1;
    int32 total = 2;
}

